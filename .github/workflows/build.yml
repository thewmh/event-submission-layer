name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build plugin
      run: npm run build

    - name: Check build output
      run: |
        ls -la dist/
        ls -la dist/assets/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: event-submission-layer
        path: dist/
        retention-days: 30