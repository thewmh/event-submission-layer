name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      deployments: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build plugin
      run: npm run build

    - name: Check build output
      run: |
        ls -la dist/
        ls -la dist/assets/

    - name: Create distribution zip
      run: |
        cd dist
        zip -r ../event-submission-layer-${{ github.ref_name }}.zip .
        cd ..
        ls -la *.zip

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: event-submission-layer-${{ github.ref_name }}
        path: |
          dist/
          event-submission-layer-*.zip
        retention-days: 30

    - name: Upload release assets
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: event-submission-layer-${{ github.ref_name }}.zip
        token: ${{ secrets.GITHUB_TOKEN }}
        fail_on_unmatched_files: true